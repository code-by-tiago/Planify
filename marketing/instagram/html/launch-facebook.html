<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Planify — Facebook</title>
    <link rel="stylesheet" href="shared-launch.css" />
    <style>
      .facebook {
        width: 1200px;
        height: 630px;
      }
      .facebook .inner {
        padding: 56px 64px;
        flex-direction: row;
        align-items: center;
        gap: 48px;
      }
      .facebook .copy {
        flex: 1.15;
      }
      .facebook h1 {
        margin-top: 20px;
        font-size: 52px;
        max-width: 620px;
      }
      .facebook .lead {
        margin-top: 18px;
        font-size: 22px;
      }
      .facebook .visual {
        flex: 0.85;
        display: grid;
        gap: 14px;
      }
      .facebook .price-box {
        margin-top: 0;
      }
      .facebook .price-value {
        font-size: 52px;
      }
      .mini-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 20px;
      }
      .mini-pills .pill {
        font-size: 14px;
        padding: 8px 14px;
      }
    </style>
  </head>
  <body>
    <section class="canvas facebook card" id="facebook-post">
      <div class="grid-overlay"></div>
      <div class="inner">
        <div class="copy">
          <div class="brand">
            <div class="brand-mark" style="width: 44px; height: 44px; font-size: 22px; border-radius: 14px">P</div>
            <div>
              <div class="brand-tag">Lançamento</div>
              <div class="brand-name" style="font-size: 24px">Planify</div>
            </div>
          </div>
          <h1>IA para professores <span class="accent">com BNCC de verdade</span></h1>
          <p class="lead">
            Um plano simples: materiais, planejamentos, Google Classroom e Comunidade docente.
          </p>
          <div class="mini-pills">
            <span class="pill">13+ ferramentas</span>
            <span class="pill">Templates oficiais</span>
            <span class="pill">Exportação PDF</span>
          </div>
        </div>
        <div class="visual">
          <div class="price-box">
            <div class="price-label">Plano Professor</div>
            <div class="price-value">R$ 24,90/mês</div>
            <div class="price-note">Preço fundador · Uso generoso</div>
          </div>
          <div class="cta" style="width: 100%; font-size: 20px; padding: 16px 24px">Conheça em iaplanify.com.br/planos</div>
        </div>
      </div>
    </section>
  </body>
</html>
